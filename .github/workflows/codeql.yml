name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1" # weekly, Monday 03:17 UTC

# Least-privilege default — the analyze job augments below with the specific
# scopes CodeQL needs (actions: read, security-events: write).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        # AUDIT R056: SHA-pinned actions (was @v3/@v4 floating).
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c1f0c97bcb634b400fc376ab260a5f187961f8e0 # v3.26.10
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@c1f0c97bcb634b400fc376ab260a5f187961f8e0 # v3.26.10

      - name: Perform analysis
        uses: github/codeql-action/analyze@c1f0c97bcb634b400fc376ab260a5f187961f8e0 # v3.26.10
        with:
          category: "/language:${{ matrix.language }}"
