name: Slither

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/slither.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/slither.yml"

# Least-privilege default — the analyze job augments below with
# security-events: write to upload the SARIF.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        # AUDIT R056: SHA-pinned (was @v4 floating).
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
        with:
          version: stable

      - name: Run Slither
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        id: slither
        with:
          target: contracts/
          solc-version: 0.8.26
          # AUDIT R056 LOW: fail-on: medium (was none). PRs that introduce
          # medium/high static-analysis findings now block merge instead of
          # silently flowing into main. False positives can be muted with
          # inline `// slither-disable-next-line <detector>`.
          fail-on: medium
          sarif: slither.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@c1f0c97bcb634b400fc376ab260a5f187961f8e0 # v3.26.10
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
