<?xml version="1.0" encoding="UTF-8"?>
<!-- Social preview banner for Tegridy Farms — 1280x640 per docs/SOCIAL_PREVIEW_SPEC.md.
     This is the repo-root social card that GitHub uses when the link is shared.
     The matching PNG export lives at frontend/public/og.png for the webapp's
     og:image meta (SVG works but PNG is safer for wider social-crawler support). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Tegridy Farms — DeFi yield protocol on Ethereum">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060c1a" />
      <stop offset="60%" stop-color="#0c1628" />
      <stop offset="100%" stop-color="#1a0f2e" />
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5e4b8" />
      <stop offset="100%" stop-color="#d4a843" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offset" />
      <feComponentTransfer><feFuncA type="linear" slope="0.6" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />
  <rect width="1280" height="640" fill="url(#glow)" />

  <!-- Geometric subtle accent lines (no image assets needed) -->
  <g stroke="#8b5cf6" stroke-opacity="0.12" stroke-width="1" fill="none">
    <path d="M0,560 Q320,500 640,560 T1280,560" />
    <path d="M0,600 Q320,540 640,600 T1280,600" />
  </g>

  <!-- Shield badge top-left -->
  <g transform="translate(68 66)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="180" height="34" rx="17"
          fill="rgba(139,92,246,0.15)" stroke="rgba(245,228,184,0.35)" stroke-width="1" />
    <g transform="translate(14 9)" stroke="#f5e4b8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 0l6 2.25v4.5c0 3.75-2.625 6.375-6 6.75-3.375-0.375-6-3-6-6.75v-4.5L8 0z" />
      <path d="M5.25 7l1.5 1.5 3-3" />
    </g>
    <text x="40" y="22" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#f5e4b8" letter-spacing="0.04em">
      AUDITED · BUG BOUNTY
    </text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(68 200)" filter="url(#soft-shadow)">
    <text font-family="'Playfair Display', Georgia, serif"
          font-size="96" font-weight="700" fill="#ede9fe" letter-spacing="-0.02em">
      Tegridy Farms
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(68 280)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="26" font-weight="500" fill="#ede9fe" opacity="0.92" letter-spacing="-0.005em">
      Real yield. No inflation tricks. Farm with tegridy.
    </text>
  </g>

  <!-- Pillars row -->
  <g transform="translate(68 360)" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <g>
      <text x="0" y="0" font-size="14" font-weight="600" fill="#f5e4b8" letter-spacing="0.12em">100% OF SWAP FEES</text>
      <text x="0" y="28" font-size="20" font-weight="400" fill="#a599c9">flow to stakers in ETH</text>
    </g>
    <g transform="translate(380 0)">
      <text x="0" y="0" font-size="14" font-weight="600" fill="#f5e4b8" letter-spacing="0.12em">FIXED SUPPLY</text>
      <text x="0" y="28" font-size="20" font-weight="400" fill="#a599c9">1B TOWELI, no mint</text>
    </g>
    <g transform="translate(680 0)">
      <text x="0" y="0" font-size="14" font-weight="600" fill="#f5e4b8" letter-spacing="0.12em">4.5× BOOST</text>
      <text x="0" y="28" font-size="20" font-weight="400" fill="#a599c9">on LP rewards, veTOWELI</text>
    </g>
  </g>

  <!-- Bottom strip: URL + chain chip -->
  <g transform="translate(68 564)" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="0" y="0" font-size="18" font-weight="600" fill="url(#gold)">tegridyfarms.xyz</text>
  </g>

  <g transform="translate(1050 556)">
    <rect x="0" y="0" width="162" height="28" rx="14"
          fill="rgba(98,126,234,0.15)" stroke="rgba(98,126,234,0.35)" stroke-width="1" />
    <circle cx="18" cy="14" r="5" fill="#627eea" />
    <text x="32" y="18" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#c9d1ff" letter-spacing="0.04em">
      ETHEREUM MAINNET
    </text>
  </g>

  <!-- Right side: stylised shield mark (protocol identity glyph, abstract) -->
  <g transform="translate(1020 170)" opacity="0.92">
    <g stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M100 0 L200 30 L200 130 C200 195 155 235 100 250 C45 235 0 195 0 130 L0 30 Z" />
      <path d="M100 40 L160 60 L160 130 C160 170 130 198 100 208 C70 198 40 170 40 130 L40 60 Z"
            opacity="0.55" />
      <path d="M60 125 L90 155 L140 95" stroke-width="4" />
    </g>
  </g>
</svg>
