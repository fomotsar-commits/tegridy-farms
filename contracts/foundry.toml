[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 10 # Minimized to fit TegridyStaking + increaseAmount() under 24KB
# AUDIT #91: via_ir required for SwapFeeRouter (stack too deep without it)
via_ir = true
# NOTE: cancun is required by OpenZeppelin v5.6.1 (uses mcopy opcode).
# For L2 deployment (Arbitrum, Optimism), compile with cancun but verify L2 opcode support.
# PUSH0 (shanghai+) is now supported on major L2s as of 2025.
evm_version = "cancun"
# WARNING: EIP-170 mainnet limit is 24576 bytes. This override MASKS deployment failures.
# If TegridyStaking exceeds 24KB, it will compile but FAIL to deploy on mainnet.
# TODO: Split TegridyStaking or reduce size to fit within 24576 bytes.
code_size_limit = 24576

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@uniswap/v4-core/=lib/v4-core/",
    "@uniswap/v4-periphery/=lib/v4-periphery/",
    "solmate/=lib/solmate/src/",
]

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=1" }
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=11155111" }

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
