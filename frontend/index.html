<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#060c1a">
    <!--
      AUDIT THEME-FOUC: pre-hydration theme script. Runs synchronously before
      CSS parses, reads the same localStorage key (tegridy-theme) the runtime
      ThemeProvider writes, and sets data-theme on <html> + updates the
      meta theme-color. Without this, light-mode users got a ~150ms flash of
      dark styles on every cold load while React booted. Keep the storage
      key (`tegridy-theme`) and the default (`dark`) in lock-step with
      frontend/src/contexts/ThemeContext.tsx.

      Requires CSP script-src 'unsafe-inline' (already allowed in vercel.json).
      Tightening CSP to use a nonce is tracked as future infra work.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tegridy-theme');
          if (t !== 'dark' && t !== 'light') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', t === 'dark' ? '#060c1a' : '#f5f3ff');
        } catch (_e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Tegridy Farms — DeFi protocol for swapping, staking, farming, and NFT finance on Ethereum">
    <link rel="apple-touch-icon" href="/art/bobowelie.jpg">
    <!-- CSP enforced via Vercel headers in vercel.json (not meta tag — avoids mobile Safari issues) -->
    <link rel="canonical" href="https://tegridyfarms.xyz/" />
    <title>Tegridy Farms | TOWELI Yield Farm</title>
    <meta property="og:title" content="Tegridy Farms | TOWELI Yield Farm" />
    <meta property="og:description" content="Art-first yield farming on Ethereum. Stake TOWELI & earn rewards. 100% of protocol revenue goes to stakers." />
    <!-- Purpose-built social preview — see docs/SOCIAL_PREVIEW_SPEC.md.
         PNG is the primary for crawler compatibility (Discord/Slack/
         Facebook image proxies only accept raster). SVG is served as
         secure_url for modern crawlers that want sharpness. Both are
         regenerated via `node scripts/render-og-png.mjs`. -->
    <meta property="og:image" content="https://tegridyfarms.xyz/og.png" />
    <meta property="og:image:secure_url" content="https://tegridyfarms.xyz/og.svg" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:alt" content="Tegridy Farms — DeFi yield protocol on Ethereum where 100% of swap fees flow to stakers" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tegridyfarms.xyz/" />
    <meta property="og:site_name" content="Tegridy Farms" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tegridy Farms | TOWELI Yield Farm" />
    <meta name="twitter:description" content="Art-first yield farming on Ethereum. Stake TOWELI & earn rewards." />
    <meta name="twitter:image" content="https://tegridyfarms.xyz/og.png" />
    <meta name="twitter:image:alt" content="Tegridy Farms — DeFi yield protocol on Ethereum" />
    <meta name="twitter:url" content="https://tegridyfarms.xyz/" />
